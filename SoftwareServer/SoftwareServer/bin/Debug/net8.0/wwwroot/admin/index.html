<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>软件管理后台</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; }

  .header {
    background: #1a1a2e; color: white; padding: 16px 32px;
    display: flex; align-items: center; gap: 12px;
  }
  .header h1 { font-size: 20px; font-weight: 600; }

  .container { max-width: 1100px; margin: 32px auto; padding: 0 24px; }

  .card {
    background: white; border-radius: 8px; padding: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 24px;
  }
  .card-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: #1a1a2e; }

  /* 表格 */
  table { width: 100%; border-collapse: collapse; }
  th { background: #f8f9fa; padding: 10px 14px; text-align: left; font-size: 13px; color: #666; border-bottom: 2px solid #eee; }
  td { padding: 12px 14px; border-bottom: 1px solid #f0f0f0; font-size: 14px; vertical-align: middle; }
  tr:hover td { background: #fafafa; }
  .empty-row td { text-align: center; color: #999; padding: 40px; }

  /* 标签 */
  .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; }
  .badge-blue { background: #e6f0ff; color: #1a6ee8; }

  /* 按钮 */
  .btn { padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-family: inherit; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: #1a6ee8; color: white; }
  .btn-danger { background: #ff4d4f; color: white; }
  .btn-sm { padding: 4px 12px; font-size: 12px; }

  /* 表单 */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 13px; color: #555; font-weight: 500; }
  input, textarea {
    padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 14px; font-family: inherit; outline: none; transition: border-color .2s;
  }
  input:focus, textarea:focus { border-color: #1a6ee8; }
  textarea { resize: vertical; min-height: 60px; }

  /* 上传区 */
  .upload-area {
    border: 2px dashed #d0d7de; border-radius: 8px; padding: 32px;
    text-align: center; cursor: pointer; transition: all .2s; background: #fafafa;
  }
  .upload-area:hover, .upload-area.drag-over { border-color: #1a6ee8; background: #f0f6ff; }
  .upload-area .icon { font-size: 32px; margin-bottom: 8px; }
  .upload-area p { color: #666; font-size: 14px; }
  .upload-area .file-name { color: #1a6ee8; font-weight: 500; margin-top: 8px; }
  #fileInput { display: none; }

  /* 进度条 */
  .progress-wrap { display: none; margin-top: 12px; }
  .progress-bar { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: #1a6ee8; border-radius: 3px; transition: width .3s; width: 0; }
  .progress-text { font-size: 12px; color: #666; margin-top: 4px; text-align: right; }

  /* 提示 */
  .toast {
    position: fixed; top: 24px; right: 24px; padding: 12px 20px;
    border-radius: 8px; color: white; font-size: 14px; z-index: 9999;
    transform: translateX(120%); transition: transform .3s;
    max-width: 320px;
  }
  .toast.show { transform: translateX(0); }
  .toast.success { background: #52c41a; }
  .toast.error { background: #ff4d4f; }

  /* 确认对话框 */
  .modal-bg {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
    z-index: 1000; align-items: center; justify-content: center;
  }
  .modal-bg.show { display: flex; }
  .modal { background: white; border-radius: 10px; padding: 28px; width: 360px; }
  .modal h3 { margin-bottom: 12px; }
  .modal p { color: #666; font-size: 14px; margin-bottom: 24px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }

  .size-hint { font-size: 12px; color: #999; margin-top: 4px; }
</style>
</head>
<body>

<div class="header">
  <span>🖥️</span>
  <h1>软件管理后台</h1>
</div>

<div class="container">

  <!-- 软件列表 -->
  <div class="card">
    <div class="card-title">📦 已发布的软件</div>
    <table id="softwareTable">
      <thead>
        <tr>
          <th>软件ID</th>
          <th>名称</th>
          <th>版本</th>
          <th>启动文件</th>
          <th>包大小</th>
          <th>最后更新</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr class="empty-row"><td colspan="7">加载中...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- 发布新版本 -->
  <div class="card">
    <div class="card-title">🚀 发布 / 更新软件</div>
    <div class="form-grid">
      <div class="form-group">
        <label>软件 ID <span style="color:#999;font-weight:400">（唯一标识，如 chrome、7zip）</span></label>
        <input id="fId" placeholder="chrome" />
      </div>
      <div class="form-group">
        <label>软件名称</label>
        <input id="fName" placeholder="Google Chrome" />
      </div>
      <div class="form-group">
        <label>版本号</label>
        <input id="fVersion" placeholder="120.0" />
      </div>
      <div class="form-group">
        <label>启动 EXE 文件名 <span style="color:#999;font-weight:400">（解压后相对路径）</span></label>
        <input id="fExe" placeholder="chrome.exe" />
      </div>
      <div class="form-group full">
        <label>描述（可选）</label>
        <textarea id="fDesc" placeholder="软件简介..."></textarea>
      </div>
      <div class="form-group full">
        <label>ZIP 安装包</label>
        <div class="upload-area" id="uploadArea">
          <div class="icon">📁</div>
          <p>点击选择或拖拽 ZIP 文件到此处</p>
          <div class="file-name" id="fileName"></div>
          <div class="size-hint" id="fileSize"></div>
        </div>
        <input type="file" id="fileInput" accept=".zip" />
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <div class="progress-text" id="progressText">0%</div>
        </div>
      </div>
    </div>
    <div style="margin-top:20px; display:flex; gap:10px; align-items:center;">
      <button class="btn btn-primary" onclick="publish()">发布版本</button>
      <span id="publishStatus" style="font-size:13px;color:#666;"></span>
    </div>
  </div>

</div>

<!-- 删除确认弹窗 -->
<div class="modal-bg" id="deleteModal">
  <div class="modal">
    <h3>确认删除</h3>
    <p id="deleteMsg"></p>
    <div class="modal-btns">
      <button class="btn" onclick="closeDeleteModal()" style="background:#f0f0f0;">取消</button>
      <button class="btn btn-danger" onclick="confirmDelete()">确认删除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let selectedFile = null;
let deleteTargetId = null;

// ── 加载软件列表 ────────────────────────────────
async function loadList() {
  try {
    const res = await fetch('/api/admin/software');
    const list = await res.json();
    renderTable(list);
  } catch {
    showToast('加载失败，请检查服务是否正常', 'error');
  }
}

function renderTable(list) {
  const tbody = document.getElementById('tableBody');
  if (!list.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="7">暂无软件，请先发布</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(pkg => `
    <tr>
      <td><code style="background:#f5f5f5;padding:2px 6px;border-radius:4px">${pkg.id}</code></td>
      <td><strong>${pkg.name}</strong></td>
      <td><span class="badge badge-blue">${pkg.version}</span></td>
      <td style="color:#666;font-size:13px">${pkg.exeName}</td>
      <td style="color:#666;font-size:13px">${formatSize(pkg.fileSize)}</td>
      <td style="color:#666;font-size:13px">${formatDate(pkg.updatedAt)}</td>
      <td>
        <button class="btn btn-danger btn-sm" onclick="askDelete('${pkg.id}', '${pkg.name}')">删除</button>
      </td>
    </tr>
  `).join('');
}

// ── 发布 ────────────────────────────────────────
async function publish() {
  const id      = document.getElementById('fId').value.trim();
  const name    = document.getElementById('fName').value.trim();
  const version = document.getElementById('fVersion').value.trim();
  const exe     = document.getElementById('fExe').value.trim();
  const desc    = document.getElementById('fDesc').value.trim();

  if (!id)      return showToast('请填写软件 ID', 'error');
  if (!version) return showToast('请填写版本号', 'error');
  if (!exe)     return showToast('请填写启动 EXE 文件名', 'error');
  if (!selectedFile) return showToast('请选择 ZIP 文件', 'error');

  const formData = new FormData();
  formData.append('zipFile', selectedFile);
  formData.append('version', version);
  formData.append('name', name || id);
  formData.append('exeName', exe);
  formData.append('description', desc);

  setPublishStatus('上传中...');
  showProgress(true);

  const xhr = new XMLHttpRequest();
  xhr.open('POST', `/api/admin/software/${id}/publish`);

  xhr.upload.onprogress = (e) => {
    if (e.lengthComputable) {
      const pct = Math.round(e.loaded / e.total * 100);
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressText').textContent = pct + '%';
    }
  };

  xhr.onload = () => {
    showProgress(false);
    if (xhr.status === 200) {
      showToast(`✅ 发布成功！${name || id} v${version}`, 'success');
      setPublishStatus('');
      resetForm();
      loadList();
    } else {
      const err = JSON.parse(xhr.responseText);
      showToast(err.message || '发布失败', 'error');
      setPublishStatus('');
    }
  };

  xhr.onerror = () => {
    showProgress(false);
    showToast('网络错误，请重试', 'error');
    setPublishStatus('');
  };

  xhr.send(formData);
}

// ── 删除 ────────────────────────────────────────
function askDelete(id, name) {
  deleteTargetId = id;
  document.getElementById('deleteMsg').textContent = `确定要删除「${name}」吗？此操作不可撤销。`;
  document.getElementById('deleteModal').classList.add('show');
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('show');
  deleteTargetId = null;
}

async function confirmDelete() {
  if (!deleteTargetId) return;
  const res = await fetch(`/api/admin/software/${deleteTargetId}`, { method: 'DELETE' });
  closeDeleteModal();
  if (res.ok) {
    showToast('删除成功', 'success');
    loadList();
  } else {
    showToast('删除失败', 'error');
  }
}

// ── 文件上传交互 ─────────────────────────────────
const uploadArea = document.getElementById('uploadArea');
const fileInput  = document.getElementById('fileInput');

uploadArea.onclick = () => fileInput.click();

fileInput.onchange = () => {
  if (fileInput.files[0]) setFile(fileInput.files[0]);
};

uploadArea.ondragover = (e) => { e.preventDefault(); uploadArea.classList.add('drag-over'); };
uploadArea.ondragleave = () => uploadArea.classList.remove('drag-over');
uploadArea.ondrop = (e) => {
  e.preventDefault();
  uploadArea.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.name.endsWith('.zip')) setFile(f);
  else showToast('请上传 .zip 格式文件', 'error');
};

function setFile(f) {
  selectedFile = f;
  document.getElementById('fileName').textContent = f.name;
  document.getElementById('fileSize').textContent = formatSize(f.size);
}

// ── 工具函数 ─────────────────────────────────────
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

function setPublishStatus(msg) {
  document.getElementById('publishStatus').textContent = msg;
}

function showProgress(show) {
  document.getElementById('progressWrap').style.display = show ? 'block' : 'none';
  if (!show) {
    document.getElementById('progressFill').style.width = '0';
    document.getElementById('progressText').textContent = '0%';
  }
}

function resetForm() {
  ['fId','fName','fVersion','fExe','fDesc'].forEach(id => document.getElementById(id).value = '');
  selectedFile = null;
  document.getElementById('fileName').textContent = '';
  document.getElementById('fileSize').textContent = '';
}

function formatSize(bytes) {
  if (!bytes) return '-';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

function formatDate(str) {
  if (!str) return '-';
  return new Date(str).toLocaleString('zh-CN');
}

loadList();
</script>
</body>
</html>
